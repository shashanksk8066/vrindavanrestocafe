name: Deploy to VPS

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Deploy Application
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.VPS_HOST }}
      username: ${{ secrets.VPS_USER }}
      key: ${{ secrets.VPS_SSH_KEY }}
      script: |
        cd /var/www/vrindavanrestocafe

        git pull origin main

        cd backend
        npm install

        pm2 restart vrindavan-api

        cd ../frontend
        npm install
        npm run build
```
